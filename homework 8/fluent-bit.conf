[SERVICE]
    Flush        1
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name   tail
    Path   /var/log/nginx/access.log
    Tag    nginx.access
    Parser nginx
    Mem_Buf_Limit 10MB

[OUTPUT]
    Name   http
    Match  nginx.*
    Host   192.168.1.15
    Port   2021
    URI    /log/ingest
    Format json
    Json_date_key timestamp

