global:
  scrape_interval: 5s
  evaluation_interval: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['192.168.1.13:9093']

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: 'prometheus_master'
    scrape_interval: 5s
    static_configs:
      - targets: ['192.168.1.13:9090']

  - job_name: 'rocket_chat'
    scrape_interval: 5s
    static_configs:
      - targets: ['192.168.1.12:9458']

  - job_name: 'node_exporter_ubuntu'
    scrape_interval: 5s
    static_configs:
      - targets: ['192.168.1.12:9100']

  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://192.168.1.12:3000
        - http://192.168.1.12:3000/api/info
        - http://192.168.1.13:9090
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.1.12:9115

  - job_name: 'blackbox_exporter'
    scrape_interval: 5s
    static_configs:
      - targets: ['192.168.1.12:9115']

  - job_name: 'mongodb_exporter'
    scrape_interval: 5s
    static_configs:
      - targets: ['192.168.1.12:9216']
