server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://192.168.1.15:3100/loki/api/v1/push

scrape_configs:

  - job_name: system
    static_configs:
      - targets: [localhost]
        labels:
          job: varlogs
          host: 192.168.1.12
          __path__: /var/log/syslog
      - targets: [localhost]
        labels:
          job: varlogs
          host: 192.168.1.12
          __path__: /var/log/auth.log
      - targets: [localhost]
        labels:
          job: varlogs
          host: 192.168.1.12
          __path__: /var/log/kern.log

  - job_name: rocket-chat
    journal:
      path: ""
      labels:
        job: rocket-chat
        host: 192.168.1.12
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        regex: 'rocketchat\.service'
        action: keep
      - source_labels: ['__journal__systemd_unit']
        target_label: unit
      - source_labels: ['__journal_priority_keyword']
        target_label: level
